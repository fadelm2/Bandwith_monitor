version: '3.8'

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    container_name: wan-system-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: network
    volumes:
      - mysql_data:/var/lib/mysql

  nats:
    image: nats:latest
    restart: unless-stopped
    container_name: wan-system-nats
    ports:
      - "4222:4222"
      - "8222:8222" # Dashboard

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wan-system-backend
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      - DATABASE_HOST=mysql
      - DATABASE_PORT=3306
      - DATABASE_USERNAME=root
      - DATABASE_PASSWORD=password
      - DATABASE_NAME=network
      - NATS_URL=nats://nats:4222
    depends_on:
      - mysql
      - nats

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wan-system-frontend
    restart: unless-stopped
    ports:
      - "8085:8085"
    depends_on:
      - backend

volumes:
  mysql_data:
